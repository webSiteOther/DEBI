<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيلتنا الحلوة - ذكرياتنا</title>
    <style>
        /* === الإعدادات الأساسية === */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
        }

        /* === شاشة البداية (لتشغيل الصوت) === */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8b);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
            transition: transform 0.3s ease;
        }

        #start-btn:hover {
            transform: scale(1.1);
        }

        /* === القسم الأول (الخلفية المتحركة والنص) === */
        #hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            display: none;
            padding: 20px 0;
        }

        /* شريط الصور المتحرك */
        .marquee-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            opacity: 0.3;
        }

        .marquee-row {
            display: flex;
            width: 200%;
            height: 33.33vh;
            animation: scroll-left 60s linear infinite;
        }

        .marquee-row:nth-child(even) {
            animation: scroll-right 65s linear infinite;
        }

        .marquee-row img, .marquee-row video {
            height: 100%;
            width: auto;
            object-fit: cover;
            border-radius: 10px;
            margin: 0 5px;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scroll-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* المربع الزجاجي (Glassmorphism) */
        .glass-card {
            position: relative;
            margin: 5vh auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .glass-card h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ffcccb;
        }

        /* سلايدر الشخصيات (يظهر كصورة واحدة تتبدل) */
        #character-slideshow {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px auto;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(255, 204, 203, 0.6);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        #character-slideshow img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #character-slideshow img.active {
            opacity: 1;
        }

        .glass-card p {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* الأزرار */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .scroll-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            width: 250px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .scroll-btn:hover {
            background: #ffcccb;
            color: #000;
            transform: translateY(-5px);
        }

        .scroll-btn.secondary {
            background: transparent;
            color: #ffcccb;
            border: 2px solid #ffcccb;
        }

        .scroll-btn.secondary:hover {
            background: #ffcccb;
            color: #111;
        }

        /* === قسم المعرض وقسم الشخصيات === */
        .section-container {
            padding: 50px 20px;
            background: #111;
            min-height: 100vh;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #ffcccb;
            border-bottom: 2px dashed rgba(255, 204, 203, 0.3);
            padding-bottom: 15px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        /* شبكة 3 في 3 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            aspect-ratio: 1 / 1;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.6s ease-out;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .grid-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .grid-item img, .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .grid-item:hover img, .grid-item:hover video {
            transform: scale(1.1);
        }

        /* === التجاوب مع الموبايل === */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .glass-card h1 { font-size: 2rem; }
            .glass-card p { font-size: 1.1rem; }
            #character-slideshow { width: 180px; height: 180px; }
        }
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <audio id="bg-audio" loop>
        <source src="s.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button id="start-btn">ابدأ الرحلة ❤️</button>
    </div>

    <div id="hero-section">
        <div class="marquee-container" id="marquee-container">
            <div class="marquee-row" id="row1"></div>
            <div class="marquee-row" id="row2"></div>
            <div class="marquee-row" id="row3"></div>
        </div>

        <div class="glass-card">
            <h1>عيلتنا الحلوة</h1>
            
            <div id="character-slideshow"></div>

            <p>
                "إحنا بدأنا الحكاية أغراب.. والصدفة جمعتنا لحد ما بقينا عيلة واحدة وعشرة عمر.<br>
                عشنا مع بعض لحظات حلوة، ضحكنا وساندنا بعض في كل خطوة.<br>
                يا رب تفضل قلوبنا متجمعة على الخير ومحدش فينا ينسى التاني أبداً،<br>
                وربنا يوفقنا كلنا في اللي جاي ويكتبلنا السعادة والنجاح."
            </p>
            
            <div class="buttons-container">
                <button class="scroll-btn" onclick="scrollToSection('gallery-section')">شاهد المعرض كاملاً</button>
                <button class="scroll-btn secondary" onclick="scrollToSection('characters-section')">الشخصيات</button>
            </div>
        </div>
    </div>

    <div id="gallery-section" class="section-container">
        <h2 class="section-title">أجمل ذكرياتنا</h2>
        <div class="grid-container" id="gallery-grid"></div>
    </div>

    <div id="characters-section" class="section-container">
        <h2 class="section-title">أبطال الحكاية</h2>
        <div class="grid-container" id="characters-grid"></div>
    </div>

    <script>
        // إعدادات المعرض
        const totalGalleryImages = 193; // تم التعديل لـ 193
        const totalGalleryVideos = 16;
        
        // إعدادات الشخصيات
        const totalCharacters = 29;

        // --- 1. تجهيز مصفوفة المعرض (الخلفية وقسم المعرض) ---
        let galleryArray = [];
        for(let i = 1; i <= totalGalleryImages; i++) {
            galleryArray.push({ type: 'image', src: `mid (${i}).jpeg` });
        }
        for(let i = 1; i <= totalGalleryVideos; i++) {
            galleryArray.push({ type: 'video', src: `mid (${i}).mp4` });
        }
        galleryArray = galleryArray.sort(() => Math.random() - 0.5);

        // ملء شريط الخلفية المتحرك بالذكريات
        const rows = [document.getElementById('row1'), document.getElementById('row2'), document.getElementById('row3')];
        galleryArray.slice(0, 60).forEach((media, index) => {
            rows[index % 3].appendChild(createMediaElement(media, true));
            rows[index % 3].appendChild(createMediaElement(media, true)); // تكرار لتجنب الفراغ
        });

        // ملء شبكة المعرض الأساسية
        const galleryGrid = document.getElementById('gallery-grid');
        galleryArray.forEach(media => {
            let container = document.createElement('div');
            container.className = 'grid-item';
            container.appendChild(createMediaElement(media, false));
            galleryGrid.appendChild(container);
        });

        // --- 2. تجهيز قسم وسلايدر الشخصيات (ملفات بصيغة .png) ---
        const charSlideshow = document.getElementById('character-slideshow');
        const charactersGrid = document.getElementById('characters-grid');

        for(let i = 1; i <= totalCharacters; i++) {
            let src = `1-1 (${i}).png`;

            // أ- إضافة الصورة لسلايدر الكارت (لتظهر كأنها صورة واحدة بتتبدل)
            let slideImg = document.createElement('img');
            slideImg.src = src;
            if(i === 1) slideImg.classList.add('active'); // أول صورة تظهر
            charSlideshow.appendChild(slideImg);

            // ب- إضافة الصورة لشبكة الشخصيات تحت
            let gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            let gridImg = document.createElement('img');
            gridImg.src = src;
            gridItem.appendChild(gridImg);
            charactersGrid.appendChild(gridItem);
        }

        // تشغيل سلايدر الشخصيات (تبديل الصور كل 2.5 ثانية)
        let slides = charSlideshow.querySelectorAll('img');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 2500);

        // --- 3. الدوال المساعدة والحركات ---
        function createMediaElement(media, isBackground) {
            let el;
            if (media.type === 'image') {
                el = document.createElement('img');
                el.src = media.src;
                el.loading = "lazy";
            } else {
                el = document.createElement('video');
                el.src = media.src;
                el.muted = true;
                el.loop = true;
                el.autoplay = true;
                if(!isBackground) el.controls = true;
            }
            return el;
        }

        // تشغيل الصوت والبدء
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('bg-audio').play();
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                document.getElementById('hero-section').style.display = 'block';
            }, 1000);
        });

        // التمرير السلس للأقسام
        function scrollToSection(sectionId) {
            document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
        }

        // حركة ظهور الصور (Fade-in-up) عند التمرير
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        // مراقبة عناصر المعرض والشخصيات
        setTimeout(() => {
            document.querySelectorAll('.grid-item').forEach(item => {
                observer.observe(item);
            });
        }, 500);
    </script>
</body>
</html>
